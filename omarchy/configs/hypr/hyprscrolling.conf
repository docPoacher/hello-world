$mainMod = SUPER

exec-once = hyprpm reload -n 

general {
    layout = scrolling 
  }

plugin {
    hyprscrolling {
       # Width of each column as fraction of monitor width
        column_width = 0.5

       # If only one column exists, make it fullscreen?
        fullscreen_on_one_column = true

        #Custom column widths for cycling with +conf / -conf
        explicit_column_widths = 0.333, 0.5, 0.667, 1.0

        #When focusing, center or fit? (0=center, 1=fit)
        focus_fit_method = 1

        #Automatically scroll to follow focus
        follow_focus = true
    }
}

unbind = $mainMod CTRL, comma

# bind = SUPER, period, layoutmsg, move +col
# bind = SUPER, comma, layoutmsg, move -col

# focusing
bind = $mainMod, right, layoutmsg, move +col
bind = $mainMod, left, layoutmsg, move -col
bind = $mainMod, x, layoutmsg, move +col
bind = $mainMod, z, layoutmsg, move -col
bind = $mainMod, mouse_up, layoutmsg, move +col
bind = $mainMod, mouse_down, layoutmsg, move -col




# swapping
bind = $mainMod SHIFT, up, layoutmsg, movewindowto u
bind = $mainMod SHIFT, down, layoutmsg, movewindowto d
bind = $mainMod SHIFT, right, layoutmsg, swapcol r
bind = $mainMod SHIFT, left, layoutmsg, swapcol l
bind = $mainMod SHIFT, mouse_up, layoutmsg, swapcol r
bind = $mainMod SHIFT, mouse_down, layoutmsg, swapcol l

# bind = $mainMod SHIFT, right, layoutmsg, swapcol r
# bind = $mainMod SHIFT, left, layoutmsg, swapcol l

# move window to half
bind = $mainMod CTRL, right, layoutmsg, movewindowto r
bind = $mainMod CTRL, left, layoutmsg, movewindowto l


bind = $mainMod, f, layoutmsg, togglefit   #THIS IF FILEBROWSER KEYBIND - needs change
bind = $mainMod, p, layoutmsg, promote
bind = $mainMod, r, layoutmsg, colresize +conf

#advanced user extras


bind = $mainMod ALT, period, layoutmsg, movecoltoworkspace +1
bind = $mainMod ALT, comma, layoutmsg, movecoltoworkspace -1
bind = $mainMod ALT, right, layoutmsg, movecoltoworkspace +1
bind = $mainMod ALT, left, layoutmsg, movecoltoworkspace -1


bind = $mainMod CTRL, up, layoutmsg, promote

