# Application bindings
$terminal = uwsm-app -- xdg-terminal-exec
$browser = omarchy-launch-browser
unbind = SUPER CTRL, B
unbind = ALT, TAB
unbind = ALT SHIFT, TAB
bind = ALT, TAB, focuscurrentorlast

bind = SUPER, Q, cyclenext
bind = SUPER SHIFT, Q, cyclenext,

bindd = SUPER, RETURN, Terminal, exec, $terminal --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- dolphin --new-window
bindd = SUPER ALT, B, Browser, exec, $browser
bindd = SUPER, B, Browser, exec, opera #(Private), exec, $browser --private
bindd = SUPER CTRL, B, Browser, exec, firefox
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER SHIFT, T, Activity, exec, omarchy-launch-tui btop
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus signal "uwsm-app -- signal-desktop"
bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus "^obsidian$" "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
bindd = SUPER SHIFT, W, Sublime, exec, uwsm-app -- subl --enable-wayland-ime
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password
bindd = SUPER ALT, S, Syncthing, exec, ~/code/scripts/syncthing_start.sh 

unbind = SUPER , F
bindd = SUPER ALT, F, Force full screen, fullscreen, 0
bindd = SUPER, F, Full width, fullscreen, 1

bindd = SUPER, SUPER_L, Walker, exec, omarchy-launch-walker
bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu


# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = SUPER ALT, A, Grok, exec, omarchy-launch-webapp "https://grok.com"
bindd = SUPER CTRL, A, Gemini, exec, omarchy-launch-webapp "https://gemini.google.com/app"
bindd = SUPER SHIFT, C, Calendar, exec, omarchy-launch-webapp "https://app.hey.com/calendar/weeks/"
bindd = SUPER SHIFT, E, Email, exec, thunderbird #omarchy-launch-webapp "https://app.hey.com"
bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
bindd = SUPER SHIFT CTRL, G, Google Messages, exec, omarchy-launch-or-focus-webapp "Google Messages" "https://messages.google.com/web/conversations"
bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
bindd = SUPER SHIFT, X, X, exec, omarchy-launch-webapp "https://x.com/"
bindd = SUPER SHIFT ALT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, Omarchy menu, exec, omarchy-menu
bindd = SUPER SHIFT, r, hyprctl, exec, ~/code/scripts/hyprctl_reload.sh && notify-send "Hyprland reloaded"


# ghetto hyperscroll
# Move focus left/right USEFUL FOR SWITCHING MONITORS
# bind = SUPER, h, exec, ~/.local/bin/hypr-focus.sh l
# bind = SUPER, l, exec, ~/.local/bin/hypr-focus.sh r

# MOVE FOCUS TO MONITOR
# bind = SUPER ALT, right, exec, omarchyctl focus_right_monitor
# bind = SUPER ALT, left, exec, omarchyctl focus_left_monitor

# Move windows left/right
bind = SUPER SHIFT, h, exec, ~/.local/bin/hypr-move.sh l
bind = SUPER SHIFT, l, exec, ~/.local/bin/hypr-move.sh r

# Cycle “columns” (workspaces) left/right
bind = SUPER, comma, exec, ~/.local/bin/hypr-cyclecol.sh prev
bind = SUPER, period, exec, ~/.local/bin/hypr-cyclecol.sh next

# Optional “overview” (lists all workspaces)
bind = SUPER, TAB, exec, hyprctl workspaces

bind = SUPER ALT, down, focusmonitor, 0
bind = SUPER ALT, up, focusmonitor, 1

